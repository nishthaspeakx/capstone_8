[theme]
primaryColor = "#003087"
backgroundColor = "#f0f4f8"
secondaryBackgroundColor = "#ffffff"
textColor = "#1a2332"
font = "sans serif"

[server]
headless = true

[client]
# Hide the Star / Fork / GitHub source-code icons in the top-right toolbar
# for the deployed app — keeps the demo focused and unbranded.
toolbarMode = "minimal"
showErrorDetails = false

[browser]
gatherUsageStats = false
